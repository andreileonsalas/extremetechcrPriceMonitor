name: Daily Price Crawler

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      urls:
        description: 'Optional: comma-separated product URLs to process (overrides DB stale-first selection)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  crawl-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Restore database from previous run
        uses: actions/cache@v4
        with:
          path: data/prices.db
          key: sqlite-db-v2-${{ github.run_id }}
          restore-keys: sqlite-db-v2-

      - name: Run price update job
        env:
          PRICE_UPDATE_URLS: ${{ github.event.inputs.urls }}
        run: npm run prices

      - name: Commit and push database ZIP
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/db.zip
          git diff --staged --quiet || git commit -m "chore: update db.zip from price crawl [skip ci]"
          git pull --rebase
          git push
