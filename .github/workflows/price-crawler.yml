name: Daily Price Crawler

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      urls:
        description: 'Optional: comma-separated product URLs to process (overrides DB stale-first selection)'
        required: false
        default: ''
      fail_on_null_price:
        description: 'Fail the job if any product has a null price'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      max_urls_per_run:
        description: 'Max products to process this run (default: 500, use higher to catch up faster)'
        required: false
        default: ''
      concurrent_requests:
        description: 'Concurrent browser pages (default: 3, max safe: 6)'
        required: false
        default: ''
      request_delay_ms:
        description: 'Delay between batches in ms (default: 1000, min safe: 500)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  crawl-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Restore database from previous run
        uses: actions/cache@v4
        with:
          path: data/prices.db
          key: sqlite-db-v2-${{ github.run_id }}
          restore-keys: sqlite-db-v2-

      - name: Run price update job
        env:
          PRICE_UPDATE_URLS: ${{ github.event.inputs.urls }}
          FAIL_ON_NULL_PRICE: ${{ github.event.inputs.fail_on_null_price || 'false' }}
          MAX_URLS_PER_RUN: ${{ github.event.inputs.max_urls_per_run }}
          CONCURRENT_REQUESTS: ${{ github.event.inputs.concurrent_requests }}
          REQUEST_DELAY_MS: ${{ github.event.inputs.request_delay_ms }}
        run: npm run prices

      - name: Commit and push database ZIP
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/db.zip
          git diff --staged --quiet || git commit -m "chore: update db.zip from price crawl [skip ci]"
          git pull --rebase
          git push
