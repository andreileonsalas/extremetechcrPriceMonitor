name: Weekly Full-Database Price Review

# Runs every Thursday at 1:00 AM UTC — checks EVERY product URL in the database,
# including those previously marked inactive (isActive = 0), to detect if removed
# products have been re-listed and to keep the full catalogue fresh.
#
# This job intentionally runs on Thursday (not Monday like the sitemap crawl) to
# avoid concurrent git pushes and cache conflicts between the two weekly workflows.
# The daily price crawler runs at 3 AM UTC and only covers active products, so this
# Thursday 1 AM run also does not overlap with the daily job.

on:
  schedule:
    - cron: '0 1 * * 4'   # Thursday 01:00 UTC
  workflow_dispatch:
    inputs:
      fail_on_null_price:
        description: 'Fail the job if null prices exceed the threshold'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  # ── Stage 1: restore DB, split ALL URLs (active + inactive) into chunks ──────
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore database from previous run
        uses: actions/cache/restore@v4
        with:
          path: data/prices.db
          key: sqlite-db-v2-${{ github.run_id }}
          restore-keys: sqlite-db-v2-

      - name: Split URLs into worker chunks (active + inactive)
        env:
          INCLUDE_INACTIVE: 'true'
        run: npm run prepare-chunks

      - name: Upload database for workers
        uses: actions/upload-artifact@v4
        with:
          name: main-db
          path: data/prices.db
          if-no-files-found: error

      - name: Upload URL chunks for workers
        uses: actions/upload-artifact@v4
        with:
          name: chunks
          path: chunks/
          if-no-files-found: error

  # ── Stage 2: 4 parallel crawl workers ────────────────────────────────────────
  crawl:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      matrix:
        worker: [0, 1, 2, 3]
      fail-fast: false   # let surviving workers finish even if one fails

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download database
        uses: actions/download-artifact@v4
        with:
          name: main-db
          path: data/

      - name: Download URL chunks
        uses: actions/download-artifact@v4
        with:
          name: chunks
          path: chunks/

      - name: Run price crawl (worker ${{ matrix.worker }})
        env:
          PRICE_UPDATE_CHUNK_FILE: chunks/chunk-${{ matrix.worker }}.json
          FAIL_ON_NULL_PRICE: ${{ github.event.inputs.fail_on_null_price || 'false' }}
        run: npm run prices

      - name: Rename worker database for upload
        if: always()
        run: cp data/prices.db data/worker-${{ matrix.worker }}.db

      - name: Upload worker database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: worker-db-${{ matrix.worker }}
          path: data/worker-${{ matrix.worker }}.db
          if-no-files-found: warn

  # ── Stage 3: merge all worker DBs → export db.zip → push ────────────────────
  merge:
    needs: crawl
    runs-on: ubuntu-latest
    if: always()   # run even when some workers fail so partial results are saved

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download main database (baseline)
        uses: actions/download-artifact@v4
        with:
          name: main-db
          path: data/

      - name: Download all worker databases
        uses: actions/download-artifact@v4
        with:
          pattern: worker-db-*
          path: data/workers/
          merge-multiple: true

      - name: Merge worker databases into main
        run: npm run merge-workers

      - name: Save merged database to cache
        uses: actions/cache/save@v4
        with:
          path: data/prices.db
          key: sqlite-db-v2-${{ github.run_id }}

      - name: Commit and push database ZIP
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/db.zip
          git diff --staged --quiet || git commit -m "chore: update db.zip from weekly db review [skip ci]"
          git pull --rebase
          git push
