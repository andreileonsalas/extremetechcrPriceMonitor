name: Sitemap URL Investigation

# Fetches all sitemaps via Playwright (bypassing Cloudflare) and reports
# which product URLs are present, with a special focus on:
#   - A specific URL you want to verify (default: the ADATA SO-DIMM that was
#     found missing from the DB)
#   - Any URL slug containing "-2" (WooCommerce disambiguation duplicates) to
#     understand how many such products the sitemap exposes or hides.
#
# Trigger manually: Actions → Sitemap URL Investigation → Run workflow

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Full product URL to look up in the sitemap (leave blank for default)'
        required: false
        default: 'https://extremetechcr.com/producto/adata-8gb-ddr5-4800-so-dimm-2/'

jobs:
  investigate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run sitemap investigation
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
        run: node scripts/investigateSitemap.js
