name: Sample Price Crawler (Quick Test)

# Run this workflow to verify the scraper works on a small set of known URLs
# before triggering the full daily crawl.  Useful after code changes.
#
# Trigger manually from: Actions -> Sample Price Crawler (Quick Test) -> Run workflow
# The built-in 5-URL sample can be overridden via the "urls" input.

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Comma-separated product URLs to test (leave blank for built-in 5-URL sample)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  sample-crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Restore database from previous run
        uses: actions/cache@v5
        with:
          path: data/prices.db
          key: sqlite-db-v2-${{ github.run_id }}
          restore-keys: sqlite-db-v2-

      - name: Run price update on sample URLs
        env:
          # If the caller passed custom URLs, use those; otherwise use the 5 known products.
          PRICE_UPDATE_URLS: >-
            ${{
              github.event.inputs.urls != '' && github.event.inputs.urls
              || 'https://extremetechcr.com/producto/lenovo-ideapad-slim-3-ryzen-7-7735hs-16gb-cosmic-blue-83k700b8gj/,https://extremetechcr.com/producto/intel-pentium-gold-g6405/,https://extremetechcr.com/producto/msi-pro-mp225v-22-100hz-9s6-3pe0cm-020/,https://extremetechcr.com/producto/razer-kraken-kitty-edition-v2-pro-rosa/,https://extremetechcr.com/producto/laptop-gaming-asus-tuf-f15/'
            }}
        run: npm run prices

      - name: Commit and push database ZIP
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/db.zip
          git diff --staged --quiet || git commit -m "chore: update db.zip from sample price crawl [skip ci]"
          git pull --rebase
          git push
