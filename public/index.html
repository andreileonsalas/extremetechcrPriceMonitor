<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Monitor automático de precios de extremetechcr.com. Consulta el historial de precios y disponibilidad en tiendas. Sitio: https://andreileonsalas.github.io/extremetechcrPriceMonitor/" />
  <title>ExtremeTechCR Price Monitor</title>
  <link rel="stylesheet" href="vendor/bootstrap.min.css" />
  <link rel="stylesheet" href="main.css" />
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <span class="navbar-brand fw-bold">ExtremeTechCR Price Monitor</span>
      <span id="dbStatus" class="text-light small"></span>
    </div>
  </nav>

  <main class="container mt-4">
    <div class="row mb-3">
      <div class="col-md-6">
        <input
          type="text"
          id="searchInput"
          class="form-control"
          placeholder="Buscar por nombre, URL o SKU..."
        />
      </div>
      <div class="col-md-3">
        <select id="sortSelect" class="form-select">
          <option value="name-asc">Nombre (A-Z)</option>
          <option value="name-desc">Nombre (Z-A)</option>
          <option value="price-asc">Precio (menor a mayor)</option>
          <option value="price-desc">Precio (mayor a menor)</option>
        </select>
      </div>
      <div class="col-md-3 text-end">
        <span id="productCount" class="text-muted small mt-2 d-inline-block"></span>
      </div>
    </div>

    <div class="row mb-3">
      <div class="col">
        <div class="d-flex flex-wrap gap-3 align-items-center">
          <small class="text-muted fw-semibold">Filtros:</small>
          <div class="form-check form-check-inline mb-0">
            <input class="form-check-input" type="checkbox" id="filterIncludeInactive" />
            <label class="form-check-label small" for="filterIncludeInactive">Incluir ya no activos</label>
          </div>
          <div class="form-check form-check-inline mb-0">
            <input class="form-check-input" type="checkbox" id="filterOnlyInStock" />
            <label class="form-check-label small" for="filterOnlyInStock">Solo en stock</label>
          </div>
        </div>
      </div>
    </div>

    <div id="loadingState" class="text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-2 text-muted">Cargando base de datos de productos...</p>
    </div>

    <div id="errorState" class="alert alert-danger d-none" role="alert"></div>

    <div id="productGrid" class="row row-cols-1 row-cols-md-3 g-4 d-none"></div>

    <div class="modal fade" id="priceModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="priceModalTitle">Historial de Precios</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="btn-group mb-3" role="group">
              <button type="button" class="btn btn-sm btn-outline-secondary range-btn" data-days="7">7 días</button>
              <button type="button" class="btn btn-sm btn-outline-secondary range-btn" data-days="30">30 días</button>
              <button type="button" class="btn btn-sm btn-outline-secondary range-btn active" data-days="365">1 año</button>
              <button type="button" class="btn btn-sm btn-outline-secondary range-btn" data-days="1825">5 años</button>
            </div>
            <canvas id="priceChart"></canvas>
            <div id="priceChartEmpty" class="text-center text-muted py-3 d-none">No hay historial de precios para este rango.</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="vendor/bootstrap.bundle.min.js"></script>
  <script src="vendor/chart.umd.js"></script>
  <script src="vendor/sql-wasm.js"></script>
  <script src="vendor/jszip.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
