<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExtremeTechCR Price Monitor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="main.css" />
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <span class="navbar-brand fw-bold">ExtremeTechCR Price Monitor</span>
      <span id="dbStatus" class="text-light small"></span>
    </div>
  </nav>

  <main class="container mt-4">
    <div class="row mb-3">
      <div class="col-md-6">
        <input
          type="text"
          id="searchInput"
          class="form-control"
          placeholder="Search by name or URL..."
        />
      </div>
      <div class="col-md-3">
        <select id="sortSelect" class="form-select">
          <option value="name-asc">Name (A-Z)</option>
          <option value="name-desc">Name (Z-A)</option>
          <option value="price-asc">Price (Low to High)</option>
          <option value="price-desc">Price (High to Low)</option>
        </select>
      </div>
      <div class="col-md-3 text-end">
        <span id="productCount" class="text-muted small mt-2 d-inline-block"></span>
      </div>
    </div>

    <div id="loadingState" class="text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-2 text-muted">Loading product database...</p>
    </div>

    <div id="errorState" class="alert alert-danger d-none" role="alert"></div>

    <div id="productGrid" class="row row-cols-1 row-cols-md-3 g-4 d-none"></div>

    <div class="modal fade" id="priceModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="priceModalTitle">Price History</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="btn-group mb-3" role="group">
              <button type="button" class="btn btn-sm btn-outline-secondary range-btn" data-days="7">7 days</button>
              <button type="button" class="btn btn-sm btn-outline-secondary range-btn" data-days="30">30 days</button>
              <button type="button" class="btn btn-sm btn-outline-secondary range-btn active" data-days="365">1 year</button>
              <button type="button" class="btn btn-sm btn-outline-secondary range-btn" data-days="1825">5 years</button>
            </div>
            <canvas id="priceChart"></canvas>
            <div id="priceChartEmpty" class="text-center text-muted py-3 d-none">No price history available for this range.</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/sql-wasm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
